# Paste this job into your CI workflow (the one named "CI"). Set `needs:` to
# your CI job IDs so the review runs only after CI is green — GitHub holds a
# `needs:` job without a runner, so there is no idle-poll cost.
#
# For API-key installs, replace the `secrets:` line below with:
#   ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
claude-review:
  name: Claude Code Review
  needs: [<your-ci-job-ids>]        # e.g. [lint, typecheck, test, build]
  if: >-
    github.event_name == 'pull_request' &&
    github.event.pull_request.user.login != 'dependabot[bot]' &&
    !startsWith(github.event.pull_request.head.ref, 'claude/') &&
    !contains(github.event.pull_request.labels.*.name, 'skip-claude-review')
  permissions:
    contents: write
    pull-requests: write
    issues: write
    id-token: write
  uses: ./.github/workflows/claude-review-core.yml
  with:
    pr_number: ${{ github.event.pull_request.number }}
  secrets:
    CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
